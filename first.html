<body>
    <form action="/register">
        <h3>Test Javascript Form validation.</h3>
        <label for="name">
            Name<b style="color: red;">*</b>
            <span style="display:inline-block; width: 86px;"></span>
        </label>
        <input type="text" name="" id="name">
        <label for="name" style="color: red;">Please enter your name!</label>
        <br>
        <label for="address">
            Address<b style="color: red;">*</b>
            <span style="display:inline-block; width: 72px;"></span>
        </label>
        <input type="text" name="" id="address">
        <br>
        <label for="zipcode">
            Zip code<b style="color: red;">*</b>
            <span style="display:inline-block; width: 68px;"></span>
        </label>
        <input type="number" name="" id="zipcode">
        <br>
        <label for="country">
            Country<b style="color: red;">*</b>
            <span style="display:inline-block; width: 73px;"></span>
        </label>
        <select name="" id="country">
            <option value="psyc">Please select your country</option>
            <option value="uz">Uzbekistan</option>
            <option value="ru">Russia</option>
            <option value="us">USA</option>
        </select>
        <br>
        <label for="gender">
            Gender<b style="color: red;">*</b>
            <span style="display:inline-block; width: 73px;"></span>
        </label>
        <input type="radio" id="gender" name="gender">
        <label for="gender">Male</label>
        <input type="radio" id="gender" name="gender">
        <label for="gender">Female</label>
        <br>
        <label for="preference">
            Preferences<b style="color: red;">*</b>
            <span style="display:inline-block; width: 46px;"></span>
        </label>
        <input type="checkbox" id="preference">
        <label for="gender">Red</label>
        <input type="checkbox" id="preference">
        <label for="gender">Green</label>
        <input type="checkbox" id="preference">
        <label for="gender">Blue</label>
        <br>
        <label for="phonenum">
            Phone<b style="color: red;">*</b>
            <span style="display:inline-block; width: 85px;"></span>
        </label>
        <input type="tel" name="tel" id="phonenum">
        <br>
        <label for="mail">
            Email<b style="color: red;">*</b>
            <span style="display:inline-block; width: 87px;"></span>
        </label>
        <input type="email" id="mail" name="mail">
        <br>
        <label for="password">
            Password<b style="color: red;">*</b>
            <span style="display:inline-block; width: 64px;"></span>
        </label>
        <input type="password" name="pass" id="password">
        <br>
        <label for="password">
            Verify password<b style="color: red;">*</b>
            <span style="display:inline-block; width: 21px;"></span>
        </label>
        <input type="password" name="pass" id="">
        <br>
        <span style="display:inline-block; width: 138px;"></span>
        <input type="submit" name="submit" value="Submit">
        <input type="reset" name="clear" value="Clear">
    </form>
